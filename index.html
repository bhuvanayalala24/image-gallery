<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Image Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    text-align:center;
    padding:20px;
}

h1{
    margin-bottom:20px;
    color:#333;
}

.filter-buttons{
    margin-bottom:20px;
}

.filter-buttons button{
    padding:10px 18px;
    margin:5px;
    border:none;
    background:#007BFF;
    color:white;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
}

.filter-buttons button:hover{
    background:#0056b3;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.image{
    overflow:hidden;
    border-radius:10px;
}

.image img{
    width:100%;
    height:250px;
    object-fit:cover;
    cursor:pointer;
    transition:0.4s;
}

.image img:hover{
    transform:scale(1.08);
    filter:brightness(80%);
}

#lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}

#lightbox img{
    width:80%;
    max-width:800px;
    border-radius:10px;
}

.close{
    position:absolute;
    top:20px;
    right:35px;
    font-size:40px;
    color:white;
    cursor:pointer;
}

.prev,.next{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:none;
    border:none;
    color:white;
    font-size:45px;
    cursor:pointer;
}

.prev{
    left:20px;
}

.next{
    right:20px;
}

@media(max-width:768px){

#lightbox img{
    width:95%;
}

}
</style>
</head>

<body>

<h1>Responsive Image Gallery</h1>

<div class="filter-buttons">
<button onclick="filterImages('all')">All</button>
<button onclick="filterImages('nature')">Nature</button>
<button onclick="filterImages('city')">City</button>
<button onclick="filterImages('animals')">Animals</button>
</div>

<div class="gallery">

<div class="image nature">
<img src="https://picsum.photos/id/1015/400/300" onclick="openLightbox(0)">
</div>

<div class="image city">
<img src="https://picsum.photos/id/1011/400/300" onclick="openLightbox(1)">
</div>

<div class="image animals">
<img src="https://picsum.photos/id/1025/400/300" onclick="openLightbox(2)">
</div>

<div class="image nature">
<img src="https://picsum.photos/id/1043/400/300" onclick="openLightbox(3)">
</div>

<div class="image city">
<img src="https://picsum.photos/id/1060/400/300" onclick="openLightbox(4)">
</div>

<div class="image animals">
<img src="https://picsum.photos/id/1074/400/300" onclick="openLightbox(5)">
</div>

</div>

<div id="lightbox">
<span class="close" onclick="closeLightbox()">&times;</span>

<button class="prev" onclick="changeImage(-1)">&#10094;</button>

<img id="lightbox-img">

<button class="next" onclick="changeImage(1)">&#10095;</button>
</div>

<script>
const images=[
"https://picsum.photos/id/1015/900/600",
"https://picsum.photos/id/1011/900/600",
"https://picsum.photos/id/1025/900/600",
"https://picsum.photos/id/1043/900/600",
"https://picsum.photos/id/1060/900/600",
"https://picsum.photos/id/1074/900/600"
];

let current=0;

function openLightbox(index){
current=index;
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=images[current];
}

function closeLightbox(){
document.getElementById("lightbox").style.display="none";
}

function changeImage(step){
current+=step;

if(current<0){
current=images.length-1;
}

if(current>=images.length){
current=0;
}

document.getElementById("lightbox-img").src=images[current];
}

function filterImages(category){

let items=document.querySelectorAll(".image");

items.forEach(function(item){

if(category==="all"){
item.style.display="block";
}
else if(item.classList.contains(category)){
item.style.display="block";
}
else{
item.style.display="none";
}

});

}
</script>

</body>
</html>
